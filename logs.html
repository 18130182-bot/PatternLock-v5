<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン履歴</title>

<link rel="stylesheet" href="css/dashboard.css">

<style>
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.1);
}

th,td{
    padding:14px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#2563eb;
    color:#fff;
}

tr:hover{
    background:#f5f5f5;
}
</style>

</head>
<body>

<div class="container">

<h1>📜 ログイン履歴</h1>
    <div style="
display:flex;
gap:10px;
flex-wrap:wrap;
margin:20px 0;
">

<input
id="searchUser"
type="text"
placeholder="🔍 ユーザー名で検索"
style="
padding:10px;
border:1px solid #ccc;
border-radius:8px;
width:220px;
">

<select
id="searchStatus"
style="
padding:10px;
border:1px solid #ccc;
border-radius:8px;
">

<option value="">すべて</option>
<option value="success">🟢 success</option>
<option value="failed">🔴 failed</option>

</select>

<button
id="searchButton"
style="
padding:10px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
🔍 検索
</button>

<button
id="resetSearch"
style="
padding:10px 20px;
background:#64748b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
↺ リセット
</button>

</div>
    <button id="downloadCsv" style="
padding:10px 18px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
">
📄 CSVダウンロード
</button>

<button
id="deleteAllLogs"
style="
padding:10px 18px;
background:#dc2626;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-left:10px;
margin-bottom:20px;
">
🗑 すべて削除
</button>

<table>

<thead>

<tr>
    <th>ユーザー</th>
    <th>状態</th>
    <th>日時</th>
    <th>操作</th>
</tr>

</thead>

<tbody id="logTable">

<tr>
<td colspan="3">読み込み中...</td>
</tr>

</tbody>

</table>

<br>

<a href="home.html">← ダッシュボードへ戻る</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/logs.js"></script>

</body>
</html>
