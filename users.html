<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ユーザー管理</title>

<link rel="stylesheet" href="css/dashboard.css">

<style>

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:16px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

h1{
    margin-bottom:25px;
}

h2{
    margin-bottom:20px;
}

input,
select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

button{
    border:none;
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
}

.addButton{
    background:#2563eb;
    color:#fff;
}

.editButton{
    background:#2563eb;
    color:#fff;
    margin-right:6px;
}

.deleteButton{
    background:#dc2626;
    color:#fff;
}

.back{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#2563eb;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:#fff;
    padding:14px;
}

td{
    padding:14px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f7f9fc;
}

</style>

</head>

<body>

<div class="container">

<h1>👥 ユーザー管理</h1>

<div class="card">

<h2>➕ 新規ユーザー追加</h2>

<input
id="newUsername"
type="text"
placeholder="ユーザー名">

<input
id="newPattern"
type="text"
placeholder="パターン (例: 1-2-5-8)">

<input
id="newRedirect"
type="url"
placeholder="移動先URL">

<select id="newRole">

<option value="student">
🎓 student
</option>

<option value="admin">
👑 admin
</option>

</select>

<button
id="addUserButton"
class="addButton">

➕ ユーザー追加

</button>

</div>

<div class="card">

<h2>📋 登録ユーザー一覧</h2>
<table>

<thead>

<tr>
<th>ユーザー名</th>
<th>権限</th>
<th>移動先URL</th>
<th>操作</th>
</tr>

</thead>

<tbody id="userTable">

<tr>
<td colspan="4">読み込み中...</td>
</tr>

</tbody>

</table>

</div>

<a class="back" href="home.html">
← ダッシュボードへ戻る
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/users.js"></script>

</body>
</html>
