<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ユーザー管理</title>

<link rel="stylesheet" href="css/dashboard.css">

<style>

.container{
    max-width:1300px;
    margin:40px auto;
    padding:30px;
}

.page-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
    gap:15px;
}

.page-title h1{
    font-size:34px;
}

.page-title p{
    color:#64748b;
    margin-top:6px;
}

.card{

    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    padding:30px;
    margin-bottom:30px;

}

.card h2{

    margin-bottom:25px;
    color:#2563eb;

}

.form-grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;

}

input,
select{

    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:15px;
    transition:.2s;

}

input:focus,
select:focus{

    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);

}

.addButton{

    margin-top:20px;
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 26px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:.2s;

}

.addButton:hover{

    background:#1d4ed8;

}

.toolbar{

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;

}

.search{

    flex:1;
    min-width:280px;

}

.info{

    color:#64748b;
    font-size:14px;

}

.table-box{

    overflow:auto;
    border-radius:16px;
    border:1px solid #e5e7eb;

}

table{

    width:100%;
    min-width:900px;
    border-collapse:collapse;

}

th{

    position:sticky;
    top:0;
    background:#2563eb;
    color:white;
    padding:16px;
    text-align:left;

}

td{

    padding:16px;
    border-bottom:1px solid #ececec;
    vertical-align:middle;

}

tr:nth-child(even){

    background:#fafafa;

}

tr:hover{

    background:#eef4ff;

}

.role{

    display:inline-block;
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    color:white;

}

.role.admin{

    background:#dc2626;

}

.role.student{

    background:#16a34a;

}

.url{

    max-width:350px;
    overflow-wrap:anywhere;
    word-break:break-word;
    line-height:1.6;

}

.action{

    display:flex;
    gap:10px;

}

.editButton{

    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;

}

.deleteButton{

    background:#dc2626;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    cursor:pointer;

}

.back{

    display:inline-flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    margin-top:20px;
    color:#2563eb;
    font-weight:bold;

}

@media(max-width:700px){

.page-title{

flex-direction:column;
align-items:flex-start;

}

.form-grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<div class="page-title">

<div>

<h1>👥 ユーザー管理</h1>

<p>
PatternLock Secure のユーザーを管理します
</p>

</div>

</div>

<div class="card">

<h2>➕ 新規ユーザー追加</h2>

<div class="form-grid">

<input
id="newUsername"
type="text"
placeholder="ユーザー名">

<input
id="newPattern"
type="text"
placeholder="パターン (例: 1-2-5-8)">

<input
id="newRedirect"
type="url"
placeholder="移動先URL">

<select id="newRole">

<option value="student">
🎓 Student
</option>

<option value="admin">
👑 Admin
</option>

</select>

</div>

<button
id="addUserButton"
class="addButton">

➕ ユーザー追加

</button>

</div>

<div class="card">

<h2>📋 登録ユーザー一覧</h2>

<div class="toolbar">

<input
id="searchUser"
class="search"
type="text"
placeholder="🔍 ユーザー名・URLで検索">

    <div class="info">
    登録済みユーザー一覧
</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>
<th style="width:220px;">👤 ユーザー名</th>
<th style="width:150px;">権限</th>
<th>🌐 移動先URL</th>
<th style="width:180px;">操作</th>
</tr>

</thead>

<tbody id="userTable">

<tr>

<td colspan="4" style="text-align:center;padding:40px;color:#64748b;">
読み込み中...
</td>

</tr>

</tbody>

</table>

</div>

</div>

<a class="back" href="home.html">
← ダッシュボードへ戻る
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/users.js"></script>

</body>
</html>
