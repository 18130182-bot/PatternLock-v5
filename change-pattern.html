<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パターン変更 | PatternLock</title>

<link rel="stylesheet" href="css/change-pattern.css">

</head>


<body>


<div class="container">


<h1>
パターン変更
</h1>


<p id="message">
新しいパターンを入力してください
</p>


<div class="pattern-area">


<svg id="lineCanvas"></svg>


<div class="grid">


<div class="dot" data-id="1"></div>
<div class="dot" data-id="2"></div>
<div class="dot" data-id="3"></div>


<div class="dot" data-id="4"></div>
<div class="dot" data-id="5"></div>
<div class="dot" data-id="6"></div>


<div class="dot" data-id="7"></div>
<div class="dot" data-id="8"></div>
<div class="dot" data-id="9"></div>


</div>

</div>


<button id="saveButton">
次へ
</button>


<button id="resetButton">
リセット
</button>


<br><br>


<a href="admin.html">
管理者画面へ戻る
</a>


</div>


<script src="js/admin-auth.js"></script>

<script>
requireAdmin();
</script>


<script src="js/change-pattern.js"></script>


</body>

</html>
