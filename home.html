<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatternLock Secure</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    height:70px;
    background:#2563eb;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

aside{
    width:240px;
    background:#1e293b;
    color:white;
    padding:25px;
}

aside h2{
    margin-bottom:20px;
}

aside a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

aside a:hover{
    background:#334155;
}

main{
    flex:1;
    padding:40px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:18px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h3{
    color:#2563eb;
    margin-bottom:10px;
}

.card p{
    font-size:20px;
    font-weight:bold;
}

.logout{
    background:#dc2626;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>
<body>

<header>

<h1>🔒 PatternLock Secure</h1>

<div>

<span id="username"></span>

<button class="logout" onclick="logout()">
ログアウト
</button>

</div>

</header>

<div class="container">

<aside>

<h2>メニュー</h2>

<a href="home.html">🏠 ダッシュボード</a>
<a href="change-pattern.html">🔑 パターン変更</a>
<a href="admin.html">⚙ 管理画面</a>
<a href="logs.html">📜 ログイン履歴</a>

</aside>

<main>

<h2>ようこそ！</h2>

<p style="margin:15px 0 30px;">
ログインに成功しました。
</p>

<div class="cards">

<div class="card">
<h3>👤 ユーザー</h3>
<p id="userName">読み込み中...</p>
</div>

<div class="card">
<h3>👥 ユーザー数</h3>
<p id="userCount">読み込み中...</p>
</div>

<div class="card">
<h3>📜 ログイン履歴</h3>
<p id="logCount">読み込み中...</p>
</div>

<div class="card">
<h3>🕒 最終ログイン</h3>
<p id="lastLogin">読み込み中...</p>
</div>

<div class="card">
<h3>🟢 システム状態</h3>
<p id="systemStatus">確認中...</p>
</div>

<div class="card">
<h3>📅 今日</h3>
<p id="today"></p>

</div>
    <div class="card" style="margin-top:30px;">
    <h3>📊 ログイン統計（直近20件）</h3>

    <canvas id="loginChart" height="120"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/chart.js"></script>

</div>

</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script>

if(sessionStorage.getItem("loggedIn")!=="true"){
    location.href="login.html";
}

const username=sessionStorage.getItem("username");

document.getElementById("username").textContent=username;
document.getElementById("userName").textContent=username;

document.getElementById("today").textContent=
new Date().toLocaleString("ja-JP");

async function loadDashboard(){

    document.getElementById("systemStatus").textContent="正常";

    // ユーザー数
    const {count:userCount}=await window.db
    .from("users")
    .select("*",{count:"exact",head:true});

    document.getElementById("userCount").textContent=userCount+" 人";

    // ログイン履歴件数
    const {count:logCount}=await window.db
    .from("login_logs")
    .select("*",{count:"exact",head:true});

    document.getElementById("logCount").textContent=logCount+" 件";

    // 最新ログイン
    const {data:lastLog}=await window.db
    .from("login_logs")
    .select("login_time")
    .order("login_time",{ascending:false})
    .limit(1);

    if(lastLog && lastLog.length>0){
        document.getElementById("lastLogin").textContent=
        new Date(lastLog[0].login_time).toLocaleString("ja-JP");
    }else{
        document.getElementById("lastLogin").textContent="なし";
    }

}

loadDashboard();

function logout(){

    sessionStorage.clear();

    location.href="login.html";

}

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/chart.js"></script>

</script>

</body>
</html>
